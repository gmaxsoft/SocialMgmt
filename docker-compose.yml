# MySQL w kontenerze nasłuchuje wewnętrznie na 3306.
# Na hoście mapujemy 3307 -> 3306, żeby nie kolidować z lokalnym MySQL / innymi usługami zajmującymi port 3306 (Windows).
services:
  mysql:
    image: mysql:8.0
    container_name: socialmgmt-mysql
    restart: unless-stopped
    environment:
      # Wartość z pliku `.env` w katalogu głównym (skopiuj z `.env.example`). Nie commituj prawdziwego hasła.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: socialmgmt
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
